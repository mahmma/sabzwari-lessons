<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة دروس السيد علي السبزواري</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Reem+Kufi:wght@500&family=Cairo:wght@400;700&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --ashura-black: #0a0a0a; 
            --blood-red: #8b0000; 
            --shrine-gold: #c5a059; 
            --text-gray: #d1d1d1; 
            --main-font: 'Amiri';
            --header-font-size: 1.8rem;
        }
        body { font-family: var(--main-font), serif; background-color: var(--ashura-black); color: var(--text-gray); margin: 0; padding: 0; transition: 0.3s; }
        header { background: linear-gradient(to bottom, #000, var(--blood-red)); padding: 30px 20px; text-align: center; border-bottom: 3px solid var(--shrine-gold); }
        header h1 { color: var(--shrine-gold); font-family: 'Reem Kufi', sans-serif; font-size: var(--header-font-size); margin: 0; transition: 0.3s; }
        .container { max-width: 800px; margin: 40px auto; padding: 20px; }
        .lesson-card { background: #151515; border-radius: 5px; padding: 25px; margin-bottom: 30px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); border-right: 5px solid var(--blood-red); position: relative; }
        .lesson-title { color: var(--shrine-gold); font-size: 1.5rem; margin-bottom: 15px; border-bottom: 1px solid #222; padding-bottom: 10px; }
        audio { width: 100%; filter: invert(1) hue-rotate(180deg); margin-top: 10px; }
        .btn-text-file { display: inline-block; margin-top: 15px; color: var(--shrine-gold); text-decoration: none; border: 1px solid var(--shrine-gold); padding: 8px 20px; border-radius: 4px; transition: 0.3s; font-weight: bold; }
        .btn-text-file:hover { background: var(--shrine-gold); color: black; }
        
        .progress-container { display: none; width: 100%; background-color: #333; border-radius: 10px; margin: 15px 0; overflow: hidden; }
        .progress-bar { width: 0%; height: 10px; background-color: var(--shrine-gold); transition: width 0.3s; }
        .progress-text { font-size: 0.8rem; color: var(--shrine-gold); text-align: center; margin-top: 5px; }

        #adminPanel { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 9999; overflow-y: auto; padding: 20px; box-sizing: border-box; }
        .modal { background: #1a1a1a; max-width: 600px; margin: 20px auto; padding: 30px; border: 1px solid var(--shrine-gold); border-radius: 8px; }
        .settings-section { border-top: 1px solid #333; margin-top: 20px; padding-top: 20px; }
        .settings-title { color: var(--shrine-gold); font-size: 1.2rem; margin-bottom: 15px; display: block; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #444; color: white; box-sizing: border-box; border-radius: 4px; }
        .btn-save { background: var(--blood-red); color: white; border: none; padding: 15px; width: 100%; font-size: 1.1rem; cursor: pointer; margin-top: 10px; border-radius: 4px; }
        .admin-table { width: 100%; margin-top: 30px; border-collapse: collapse; }
        .admin-table td { padding: 10px; border-bottom: 1px solid #333; }
        .status { font-size: 0.8rem; color: var(--shrine-gold); text-align: center; }
        footer { text-align: center; padding: 40px; }
        .lock-btn { background: none; border: none; color: #333; cursor: pointer; font-size: 1.5rem; }
    </style>
</head>
<body>

<header>
    <h1 id="professorNameDisplay">سماحة الأستاذ السيد علي السبزواري</h1>
</header>

<div class="container" id="lessonsContainer">
    <p style="text-align:center;">جاري تحميل الدروس...</p>
</div>

<div id="adminPanel">
    <div class="modal">
        <h2 style="color: var(--shrine-gold); text-align: center;">إدارة المنصة العلمية</h2>
        
        <div id="statusMsg" class="status"></div>
        
        <div id="uploadProgressContainer" class="progress-container">
            <div id="uploadProgressBar" class="progress-bar"></div>
            <div id="uploadProgressText" class="progress-text">0%</div>
        </div>

        <input type="hidden" id="editDocId" value="">
        <input type="text" id="lessonName" placeholder="عنوان الدرس">
        <label>ملف الصوت (الحد الأقصى 50MB):</label>
        <input type="file" id="audioFile" accept="audio/*">
        <label>ملف النص (PDF/Word):</label>
        <input type="file" id="textFile" accept=".pdf,.doc,.docx,.txt">
        
        <button class="btn-save" id="saveBtn" onclick="uploadAndSave()">نشر / حفظ التغييرات</button>

        <div class="settings-section">
            <span class="settings-title">⚙️ إعدادات المظهر</span>
            <label>اسم الأستاذ:</label>
            <input type="text" id="profNameInput" placeholder="تغيير اسم الأستاذ">
            
            <label>نوع الخط:</label>
            <select id="fontFamilySelect">
                <option value="'Amiri'">خط الأميري (كلاسيكي)</option>
                <option value="'Cairo'">خط كايرو (مودرن)</option>
                <option value="'Tajawal'">خط تجول (ناعم)</option>
                <option value="'Reem Kufi'">خط ريم كوفي (تراثي)</option>
            </select>

            <label>حجم خط العنوان:</label>
            <select id="fontSizeSelect">
                <option value="1.2rem">صغير جداً</option>
                <option value="1.5rem">صغير</option>
                <option value="1.8rem" selected>متوسط</option>
                <option value="2.2rem">كبير</option>
                <option value="2.8rem">كبير جداً</option>
            </select>

            <button class="btn-save" style="background: #c5a059; color: black;" onclick="saveSettings()">حفظ الإعدادات</button>
        </div>

        <button onclick="closeAdmin()" style="width:100%; margin-top:20px; background:#333; color:white; border:none; padding:10px; cursor:pointer; border-radius: 4px;">إلغاء وخروج</button>

        <table class="admin-table" id="adminTable"></table>
    </div>
</div>

<footer>
    <button class="lock-btn" onclick="openAdmin()">⚙</button>
</footer>

<script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

    const supabaseUrl = 'https://sphvfjmsvhanggujqncc.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNwaHZmam1zdmhhbmdndWpxbmNjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1NDY4NTQsImV4cCI6MjA5MzEyMjg1NH0.giGNQ2pGO0j2cqKmSBjPqciae40Vf1ffB3Yjiq2slMc'; 
    const supabase = createClient(supabaseUrl, supabaseKey);

    const tableName = 'مكتبة السبزواري';
    const bucketName = 'my-files';

    function applySettings() {
        const savedName = localStorage.getItem('profName') || "سماحة الأستاذ السيد علي السبزواري";
        const savedFont = localStorage.getItem('mainFont') || "'Amiri'";
        const savedSize = localStorage.getItem('headerSize') || "1.8rem";

        document.getElementById('professorNameDisplay').innerText = savedName;
        document.getElementById('profNameInput').value = savedName;
        document.documentElement.style.setProperty('--main-font', savedFont);
        document.documentElement.style.setProperty('--header-font-size', savedSize);
        
        document.getElementById('fontFamilySelect').value = savedFont;
        document.getElementById('fontSizeSelect').value = savedSize;
    }

    window.saveSettings = () => {
        const newName = document.getElementById('profNameInput').value;
        const newFont = document.getElementById('fontFamilySelect').value;
        const newSize = document.getElementById('fontSizeSelect').value;
        localStorage.setItem('profName', newName);
        localStorage.setItem('mainFont', newFont);
        localStorage.setItem('headerSize', newSize);
        applySettings();
        alert("تم حفظ الإعدادات بنجاح!");
    };

    window.uploadAndSave = async () => {
        const name = document.getElementById('lessonName').value;
        const audioFile = document.getElementById('audioFile').files[0];
        const textFile = document.getElementById('textFile').files[0];
        const editId = document.getElementById('editDocId').value;
        const btn = document.getElementById('saveBtn');
        const status = document.getElementById('statusMsg');
        const progressContainer = document.getElementById('uploadProgressContainer');
        const progressBar = document.getElementById('uploadProgressBar');
        const progressText = document.getElementById('uploadProgressText');

        if (!name) return alert("يرجى كتابة العنوان");
        
        if (audioFile && audioFile.size > 50 * 1024 * 1024) {
            return alert("عذراً، حجم الملف الصوتي يتجاوز 50 ميجابايت.");
        }

        btn.disabled = true;
        status.innerText = "جاري بدء الرفع...";
        progressContainer.style.display = 'block';
        progressBar.style.width = '5%';
        progressText.innerText = '5%';

        try {
            let audioUrl = "";
            let textUrl = "";

            if (audioFile) {
                const path = `audio/${Date.now()}_${audioFile.name}`;
                status.innerText = "جاري رفع الملف الصوتي...";
                
                const { data, error } = await supabase.storage.from(bucketName).upload(path, audioFile);
                
                if (error) {
                    console.error("Audio Upload Error:", error);
                    throw new Error("خطأ في رفع الصوت: " + (error.message || "تأكد من سياسات التخزين"));
                }
                
                progressBar.style.width = '50%';
                progressText.innerText = '50%';
                audioUrl = supabase.storage.from(bucketName).getPublicUrl(path).data.publicUrl;
            }

            if (textFile) {
                const path = `text/${Date.now()}_${textFile.name}`;
                status.innerText = "جاري رفع الملف النصي...";
                const { data, error } = await supabase.storage.from(bucketName).upload(path, textFile);
                if (error) {
                    console.error("Text Upload Error:", error);
                    throw new Error("خطأ في رفع النص: " + (error.message || "تأكد من سياسات التخزين"));
                }
                progressBar.style.width = '80%';
                progressText.innerText = '80%';
                textUrl = supabase.storage.from(bucketName).getPublicUrl(path).data.publicUrl;
            }

            status.innerText = "جاري حفظ البيانات...";
            const dbData = { title: name };
            if (audioUrl) dbData.audio_url = audioUrl;
            if (textUrl) dbData.text_url = textUrl;

            let dbResult;
            if (editId) {
                dbResult = await supabase.from(tableName).update(dbData).eq('id', editId);
            } else {
                dbResult = await supabase.from(tableName).insert([dbData]);
            }

            if (dbResult.error) {
                console.error("Database Error:", dbResult.error);
                throw new Error("خطأ في قاعدة البيانات: " + dbResult.error.message);
            }
            
            progressBar.style.width = '100%';
            progressText.innerText = '100%';
            alert("تم الحفظ بنجاح!");
            location.reload();
        } catch (e) {
            console.error("General Error:", e);
            alert(e.message || "حدث خطأ غير متوقع!");
        } finally {
            btn.disabled = false;
            status.innerText = "";
            progressContainer.style.display = 'none';
        }
    };

    async function loadLessons() {
        try {
            const { data, error } = await supabase
                .from(tableName)
                .select('*')
                .order('id', { ascending: false });
            
            if (error) throw error;
            if (data) {
                renderUI(data);
                renderAdminUI(data);
            }
        } catch (e) {
            console.error("Load Error:", e);
            document.getElementById('lessonsContainer').innerHTML = `<p style="color:red; text-align:center;">خطأ في تحميل الدروس: ${e.message}</p>`;
        }
    }

    function renderUI(lessons) {
        const container = document.getElementById('lessonsContainer');
        if (lessons.length === 0) {
            container.innerHTML = '<p style="text-align:center;">لا توجد دروس مضافة حالياً.</p>';
            return;
        }
        container.innerHTML = lessons.map(l => {
            const aUrl = l.audio_url || l.audioUrl || "";
            const tUrl = l.text_url || l.textUrl || "";
            
            return `
                <div class="lesson-card">
                    <div class="lesson-title">● ${l.title}</div>
                    ${aUrl ? `
                        <audio controls preload="metadata">
                            <source src="${aUrl}" type="audio/mpeg">
                            <source src="${aUrl}" type="audio/wav">
                            <source src="${aUrl}" type="audio/ogg">
                            متصفحك لا يدعم مشغل الصوت.
                        </audio>` : '<p style="font-size:0.8rem; color:#555;">لا يوجد ملف صوتي</p>'}
                    ${tUrl ? `<a href="${tUrl}" target="_blank" class="btn-text-file">📄 تحميل ملف الدرس</a>` : ''}
                </div>
            `;
        }).join('');
    }

    function renderAdminUI(lessons) {
        const table = document.getElementById('adminTable');
        table.innerHTML = lessons.map(l => `
            <tr>
                <td>${l.title}</td>
                <td style="text-align:left">
                    <button onclick="window.setupEdit('${l.id}', '${l.title}')" style="color:#4aa3ff; background:none; border:none; cursor:pointer;">تعديل</button>
                    <button onclick="window.deleteItem('${l.id}')" style="color:#ff4a4a; background:none; border:none; cursor:pointer; margin-right:10px;">حذف</button>
                </td>
            </tr>
        `).join('');
    }

    window.deleteItem = async (id) => {
        if (confirm("هل تود حذف هذا الدرس نهائياً؟")) {
            const { error } = await supabase.from(tableName).delete().eq('id', id);
            if (error) alert("خطأ في الحذف: " + error.message);
            else location.reload();
        }
    };

    window.setupEdit = (id, title) => {
        document.getElementById('editDocId').value = id;
        document.getElementById('lessonName').value = title;
        document.getElementById('saveBtn').innerText = "تحديث البيانات";
        window.scrollTo(0, 0);
    };

    window.openAdmin = () => {
        if (prompt("كلمة المرور:") === "0000") {
            document.getElementById('adminPanel').style.display = 'block';
        }
    };

    window.closeAdmin = () => document.getElementById('adminPanel').style.display = 'none';

    applySettings();
    loadLessons();
</script>
</body>
</html>
